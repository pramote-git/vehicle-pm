# wrangler.toml — คอนฟิก Cloudflare Pages + Functions สำหรับ Vehicle PM
# static: docs/  ·  API: functions/api.js  ·  DB: D1  ·  ไฟล์แนบ: R2
name = "vehicle-pm"
compatibility_date = "2024-09-23"
pages_build_output_dir = "docs"

# ฐานข้อมูล D1 — แทน database_id ด้วยค่าจริงหลังรัน `wrangler d1 create vehicle-pm-db`
[[d1_databases]]
binding = "DB"
database_name = "vehicle-pm-db"
database_id = "07a17953-f62e-4a25-a7be-c902994274b3"

# ที่เก็บไฟล์แนบใบเสร็จ (แบบ S3) — เปิดใช้ทีหลัง (ต้องเปิด R2 ใน dashboard ก่อน)
# หลังรัน `wrangler r2 bucket create vehicle-pm-receipts` แล้วค่อยเอา 3 บรรทัดล่างออกจากคอมเมนต์
# [[r2_buckets]]
# binding = "RECEIPTS"
# bucket_name = "vehicle-pm-receipts"
